name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: build / test / smoke (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (lockfile-pinned)
        run: npm ci

      - name: Build (tsc typecheck + compile)
        run: npm run build

      - name: Test (vitest)
        run: npm test

      - name: ProofLoop gate
        run: node dist/cli.js gate

      - name: Smoke — CLI runs with zero runtime deps
        run: |
          node dist/cli.js help
          node dist/cli.js doctor
          node dist/cli.js prompt > /dev/null
